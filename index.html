<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Advanced Kanban Board</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Dark/Light Mode Toggle -->
<div class="mode-toggle position-fixed top-0 end-0 m-3">
  <button id="toggleMode" class="btn btn-secondary"><i class="fas fa-moon"></i></button>
</div>

<div class="container my-5">
  <h1 class="text-center mb-4">Super Advanced Kanban Board</h1>

  <!-- Add Task -->
  <div class="card p-3 mb-4 shadow add-task-card">
    <div class="input-group">
      <input type="text" id="newTask" class="form-control" placeholder="Enter new task">
      <input type="date" id="dueDate" class="form-control">
      <select id="priority" class="form-select">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
      <button id="addTaskBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Add Task</button>
    </div>
  </div>

  <!-- Kanban Columns -->
  <div class="row text-center kanban-board">
    <div class="col-md-4 mb-3">
      <div class="card shadow column" data-status="todo">
        <div class="card-header bg-warning text-white d-flex justify-content-between">
          To Do <span id="todoCount">0</span>
        </div>
        <div class="card-body" id="todoTasks"></div>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="card shadow column" data-status="inprogress">
        <div class="card-header bg-info text-white d-flex justify-content-between">
          In Progress <span id="inprogressCount">0</span>
        </div>
        <div class="card-body" id="inprogressTasks"></div>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="card shadow column" data-status="done">
        <div class="card-header bg-success text-white d-flex justify-content-between">
          Done <span id="doneCount">0</span>
        </div>
        <div class="card-body" id="doneTasks"></div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
